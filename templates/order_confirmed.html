<!DOCTYPE html>
<html>
<head>

      height:100%;

      background:#0a8f63; /* green */
      color:#fff;
      font-family: Arial, sans-serif;
    }
    .box{
      text-align:center;
    }
    .icon{
      width:70px;height:70px;
      border-radius:50%;

      color:#0a8f63;
      font-size:34px;
      font-weight:bold;
    }
    h1{ margin:0; font-size:28px; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="box">
      <div class="icon">%</div>
      <h1>Order Confirmed!</h1>
    </div>
  </div>

  <script>
    // ✅ after 5 seconds go to success page
    setTimeout(function () {
       window.location.href = "{{ redirect_url }}";
    }, 2500);
  </script>

</html>

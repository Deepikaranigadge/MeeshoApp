{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<style>
  /* Center section exactly like Meesho */
  .mo-wrap{
    width:100%;
    display:flex;
    justify-content:center;
    padding: 40px 0 80px;
    background:#fff;
  }
  .mo-center{
    max-width: 820px;
    width: 92vw;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .mo-svg{
    width: 280px;
    height: 280px;
    margin-top: 10px;
    margin-bottom: 10px;
  }

  .mo-title{
    font-size: 28px;
    font-weight: 700;
    color:#111827;
    margin-top: 8px;
  }

  .mo-sub{
    font-size: 18px;
    font-weight: 500;
    color:#6b7280;
    margin-top: 10px;
  }

  .mo-btn{
    margin-top: 22px;
    background:#9f2089;
    border:0;
    color:#fff;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 26px;
    border-radius: 4px;
    min-width: 260px;
    cursor:pointer;
  }
  .mo-btn:hover{ filter:brightness(.98); }

  .mo-link{ text-decoration:none; }
</style>
{% endblock %}

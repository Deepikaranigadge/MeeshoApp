{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Delivery Address</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f6f7fb;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        .container-box {
            max-width: 500px;
            background: #fff;
            margin: auto;
            min-height: 100vh;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .close-btn {
            font-size: 22px;
            cursor: pointer;
        }

        /* Section Title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0 10px;
        }

        .section-title i {
            color: #5a7ffb;
            font-size: 18px;
        }

        /* Inputs */
        .form-control,
        .form-select {
            border: none;
            border-bottom: 1px solid #cfcfe0;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            font-size: 15px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-bottom: 2px solid #9c1f7a;
        }

        .form-select {
            background-position: right 0 center;
        }

        /* Bottom Button */
       .save-btn {
            background-color: #9c1f7a;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            border-radius: 6px;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="container-box">
<form method="POST" action="{% url 'edit_address' address.id %}">
  {% csrf_token %}
    <!-- HEADER -->
    <div class="header">
        <span>EDIT DELIVERY ADDRESS</span>
        <i class="bi bi-x-lg close-btn"></i>
    </div>

    <!-- CONTACT DETAILS -->
    <div class="d-flex justify-content-between align-items-center">
        <div class="section-title">
            <i class="bi bi-telephone-fill"></i>
            <span>Contact Details</span>
        </div>
       
    </div>

    <input type="text" class="form-control mt-3" placeholder="Name" value="{{ address.name }}">
    <input type="text" class="form-control mt-4" placeholder="Contact Number" value="{{ address.phone }}">

    <!-- ADDRESS -->
    <div class="section-title">
        <i class="bi bi-geo-alt-fill"></i>
        <span>Address</span>
    </div>

    <input type="text" class="form-control mt-3" placeholder="House no. / Building name"  value="{{ address.house }}">
    <input type="text" class="form-control mt-4" placeholder="Road name / Area / Colony"  value="{{ address.area }}">
    <input type="text" class="form-control mt-4" placeholder="Pincode" value="{{ address.pincode }}">

    <div class="row mt-4">
        <div class="col-6">
            <input type="text" class="form-control" placeholder="City"  value="{{ address.city }}">
        </div>
        <div class="col-6">
            <select class="form-select">
                <option selected disabled>State</option>
                <option>Andaman and Nicobar Islands</option>
                <option>Andhra Pradesh</option>
                <option>Arunachal Pradesh</option>
                <option>Assam</option>
                <option>Bihar</option>
                <option>Chandigarh</option>
                <option>Chhattisgarh</option>
                <option>Dadra and Nagar Haveli and Daman and Diu</option>
                <option>Delhi</option>
                <option>Goa</option>
                <option>Gujarat</option>
                <option>Haryana</option>
                <option>Himachal Pradesh</option>
                <option>Jammu & Kashmir</option>
                <option>Jharkhand</option>
                <option>Karnataka</option>
                <option>Kerala</option>
                <option>Ladakh</option>
                <option>Lakshadweep</option>
                <option>Madhya Pradesh</option>
                <option>Maharashtra</option>
                <option>Manipur</option>
                <option>Meghalaya</option>
                <option>Mizoram</option>
                <option>Nagaland</option>
                <option>Odisha</option>
                <option>Puducherry</option>
                <option>Punjab</option>
                <option>Rajasthan</option>
                <option>Sikkim</option>
                <option>Tamil Nadu</option>
                <option>Telangana</option>
                <option>Tripura</option>
                <option>Uttarakhand</option>
                <option>Uttar Pradesh</option>
                <option>West Bengal</option>
            </select>
        </div>
    </div>

    <input type="text" class="form-control mt-4"
           placeholder="Nearby Famous Place / Shop / School (optional)" value="{{ address.landmark }}">

</div>

<!-- BOTTOM BUTTON -->
<button type="submit" class="save-btn">Continue</button>
</form>
</body>
</html>

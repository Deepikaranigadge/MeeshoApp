name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd ~/fsd_fe/MeeshoApp
            git fetch origin
            git reset --hard origin/main
            sudo docker build -t meeshoapp .
            sudo docker stop meeshoapp_container || true
            sudo docker rm meeshoapp_container || true
            sudo docker run -d -p 8000:8000 --env-file .env --name meeshoapp_container meeshoapp
            sudo docker exec meeshoapp_container python manage.py collectstatic --noinput